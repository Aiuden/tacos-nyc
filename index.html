<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYTaco</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
    <div class="nav-links" id="nav-links">
      <a href="#rankings">Rankings</a>
      <a href="#map">Map</a>
      <div class="nav-logo">
        <div class="logo-text">NY<span class="logo-nyc">TACO</span></div>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-inner">
      <h1 class="site-title">NYTaco</h1>
      <p class="site-tagline">rating &amp; tracking every taco joint in new york city</p>
      <div class="taco-icon">&#127790;</div>
    </div>
  </header>

  <!-- RANKINGS TABLE -->
  <section id="rankings" class="section">
    <h2 class="section-title">The Rankings</h2>
    <p class="section-subtitle">Sorted by overall score. Click any column to re-sort.</p>

    <div class="table-wrapper">
      <table id="rankings-table">
        <thead>
          <tr>
            <th data-col="rank" class="sortable active asc">#</th>
            <th data-col="name" class="sortable">Spot</th>
            <th data-col="taco" class="sortable">Taco</th>
            <th data-col="toppings" class="sortable">Toppings</th>
            <th data-col="store" class="sortable">Store</th>
            <th data-col="overall" class="sortable">Overall</th>
          </tr>
        </thead>
        <tbody id="rankings-body">
        </tbody>
      </table>
    </div>
  </section>

  <!-- MAP SECTION -->
  <section id="map" class="section">
    <h2 class="section-title">The Map</h2>
    <p class="section-subtitle">Every spot we've visited, pinned on the map.</p>
    <div id="map-container"></div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>nytaco &mdash; made with love and hot sauce</p>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
